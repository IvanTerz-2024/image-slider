<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Слайдер изображений</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="slider" aria-label="Слайдер изображений">
      <h1>Слайдер изображений</h1>

      <div class="image-frame">
        <img id="slider-image" src="images/image1.jpg" alt="Изображение 1">
      </div>

      <p id="counter" class="counter" aria-live="polite"></p>

      <div class="controls">
        <button id="prev-button" type="button">Назад</button>
        <button id="next-button" type="button">Вперёд</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
